<style>
  /* -------------------------------------------------------------
   * Yoza's Financial Report – shared UI styles for HTML Service dialogs.
   * Fintech-inspired, light/dark friendly, mobile-first.
   * Loaded into every other HTML template via:
   *   <?!= include('Styles'); ?>
   * ------------------------------------------------------------- */

  :root {
    --primary: #5B5BD6;
    --primary-soft: #EEF2FF;
    --primary-dark: #3E3EBF;
    --accent: #22D3A6;
    --danger: #EF4444;
    --warning: #F59E0B;
    --success: #10B981;
    --info: #3B82F6;
    --bg: #F8FAFC;
    --card: #FFFFFF;
    --muted: #64748B;
    --text: #0F172A;
    --border: #E2E8F0;
    --ring: rgba(91, 91, 214, 0.2);
    --radius: 14px;
    --shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 8px 24px rgba(15, 23, 42, 0.06);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0B1220;
      --card: #111827;
      --text: #F8FAFC;
      --muted: #94A3B8;
      --border: #1F2937;
      --primary-soft: #1E1B4B;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 8px 24px rgba(0, 0, 0, 0.45);
    }
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    padding: 16px;
    max-width: 720px;
    margin: 0 auto;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .header .logo {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
  }
  .header h1 {
    font-size: 16px;
    margin: 0;
    font-weight: 600;
  }
  .header .sub {
    font-size: 12px;
    color: var(--muted);
  }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    padding: 16px;
    margin-bottom: 14px;
  }

  .grid { display: grid; gap: 12px; }
  .grid.cols-2 { grid-template-columns: 1fr 1fr; }
  .grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  @media (max-width: 520px) {
    .grid.cols-2, .grid.cols-3 { grid-template-columns: 1fr; }
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  input, select, textarea {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 14px;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
    font-family: inherit;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 4px var(--ring);
  }
  textarea { min-height: 72px; resize: vertical; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 16px;
    border-radius: 10px;
    border: 1px solid transparent;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: transform 0.05s ease, box-shadow 0.15s ease, background 0.15s ease;
    text-decoration: none;
    user-select: none;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary {
    background: var(--primary);
    color: #fff;
  }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-secondary {
    background: var(--card);
    color: var(--text);
    border-color: var(--border);
  }
  .btn-secondary:hover { background: var(--primary-soft); }
  .btn-danger {
    background: var(--danger); color: #fff;
  }
  .btn-block { width: 100%; }
  .btn[disabled] { opacity: 0.6; cursor: not-allowed; }

  .row { display: flex; gap: 8px; align-items: center; }
  .row.between { justify-content: space-between; }
  .row.wrap { flex-wrap: wrap; }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    background: var(--primary-soft);
    color: var(--primary);
  }
  .pill.green { background: #ECFDF5; color: #047857; }
  .pill.red   { background: #FEE2E2; color: #B91C1C; }
  .pill.amber { background: #FEF3C7; color: #92400E; }
  .pill.gray  { background: #F1F5F9; color: #475569; }

  .muted { color: var(--muted); }
  .small { font-size: 12px; }
  .strong { font-weight: 600; }
  .right { text-align: right; }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 14px 0;
  }

  .toast {
    position: fixed;
    left: 50%; bottom: 16px;
    transform: translateX(-50%);
    background: var(--text);
    color: var(--card);
    padding: 10px 16px;
    border-radius: 999px;
    font-size: 13px;
    box-shadow: var(--shadow);
    opacity: 0;
    transition: opacity 0.2s ease;
    z-index: 99;
  }
  .toast.show { opacity: 1; }
  .toast.error { background: var(--danger); }

  .kv {
    display: flex; justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px dashed var(--border);
  }
  .kv:last-child { border-bottom: none; }
  .kv .k { color: var(--muted); }
  .kv .v { font-weight: 600; }

  /* Confidence indicator bar */
  .conf-wrap {
    display: flex; align-items: center; gap: 10px;
  }
  .conf-bar {
    flex: 1;
    height: 8px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }
  .conf-bar > span {
    display: block;
    height: 100%;
    background: linear-gradient(90deg, var(--danger), var(--warning), var(--success));
    border-radius: 999px;
  }

  .stack > * + * { margin-top: 10px; }

  ul.tags {
    list-style: none;
    margin: 0; padding: 0;
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  ul.tags li {
    background: var(--primary-soft);
    color: var(--primary);
    padding: 2px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
  }

  .examples {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .examples button {
    background: var(--primary-soft);
    color: var(--primary);
    border: 1px dashed var(--border);
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 12px;
    cursor: pointer;
  }
  .examples button:hover { border-color: var(--primary); }
</style>
